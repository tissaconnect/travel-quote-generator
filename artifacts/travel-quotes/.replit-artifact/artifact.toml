kind = "web"
previewPath = "/"
title = "Travel Quote Generator"
version = "1.0.0"
id = "artifacts/travel-quotes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20485

[services.development]
run = "pnpm --filter @workspace/travel-quotes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/travel-quotes", "run", "build" ]
publicDir = "artifacts/travel-quotes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20485"
BASE_PATH = "/"
